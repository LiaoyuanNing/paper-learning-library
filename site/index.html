<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="论文学习库：用中文探索经筛选的 arXiv 论文。" />
    <title>论文学习库 · Paper Notes</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>
    <header class="site-header">
      <div class="shell header-content">
        <a class="brand" href="./" aria-label="返回论文学习库首页">
          <span class="brand-mark" aria-hidden="true">P</span>
          <span>
            <strong>论文学习库</strong>
            <small>Paper Notes</small>
          </span>
        </a>
        <p class="header-note">8 篇 · arXiv 学习卡片</p>
      </div>
    </header>

    <main id="main-content" class="shell page-shell" tabindex="-1">
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">MVP · AI AGENTS / TOOLING / VLA</p>
        <h1 id="page-title">从论文原文，到可复用的学习笔记。</h1>
        <p>阅读 arXiv 原始摘要、中文学习摘要与提炼亮点。每项 AI 生成内容均明确标识来源与时间。</p>
      </section>

      <section class="copyright-note" aria-label="版权姿态">
        <span aria-hidden="true">◎</span>
        <p><strong>不存储论文全文。</strong>本库仅保留元数据、原始摘要、AI 生成中文内容与来源链接；阅读全文请前往 arXiv。</p>
      </section>

      <section id="filters" class="filters" aria-label="筛选论文">
        <label class="search-field" for="search-input">
          <span class="sr-only">按标题或作者搜索</span>
          <span aria-hidden="true">⌕</span>
          <input id="search-input" type="search" placeholder="搜索标题或作者…" autocomplete="off" />
        </label>
        <label class="select-field" for="category-filter">
          <span>分类</span>
          <select id="category-filter"><option value="">全部分类</option></select>
        </label>
        <label class="select-field" for="topic-filter">
          <span>来源主题</span>
          <select id="topic-filter"><option value="">全部来源主题</option></select>
        </label>
        <label class="select-field" for="custom-tag-filter">
          <span>自定义标签</span>
          <select id="custom-tag-filter"><option value="">全部自定义标签</option></select>
        </label>
        <label class="select-field" for="reading-state-filter">
          <span>阅读状态</span>
          <select id="reading-state-filter"><option value="">全部阅读状态</option></select>
        </label>
      </section>

      <section id="saved-views" class="saved-views" aria-label="保存的筛选">
        <div class="saved-views-copy">
          <p class="section-label">本地保存的筛选</p>
          <p>只保存当前搜索、分类、来源主题、自定义标签和阅读状态组合。</p>
        </div>
        <label class="select-field saved-view-select" for="saved-view-select">
          <span>已保存</span>
          <select id="saved-view-select"><option value="">选择已保存的筛选</option></select>
        </label>
        <label class="saved-view-name" for="saved-view-name">
          <span class="sr-only">保存筛选名称</span>
          <input id="saved-view-name" type="text" maxlength="80" placeholder="例如：本周精读" autocomplete="off" />
        </label>
        <div class="saved-view-actions">
          <button type="button" id="save-saved-view">保存当前</button>
          <button type="button" id="rename-saved-view" class="button-secondary" disabled>重命名所选</button>
          <button type="button" id="delete-saved-view" class="button-secondary danger-button" disabled>删除所选</button>
        </div>
      </section>

      <p id="storage-notice" class="storage-notice" role="status" hidden></p>

      <div id="result-summary" class="result-summary" aria-live="polite"></div>
      <section id="reader" aria-live="polite" aria-busy="true"></section>
    </main>

    <footer class="site-footer">
      <div class="shell">
        <p>数据来源 <strong>AGE-23 · paper_learning_mvp_seed_v1</strong> · 原始元数据来自 arXiv</p>
      </div>
    </footer>

    <noscript><p class="noscript">此阅读页需要启用 JavaScript 才能加载结构化论文数据。</p></noscript>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
