<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Learning Library</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100vw - 40px));
        padding: 48px;
        border: 1px solid #d9deea;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 14px;
        font-size: 34px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.65;
        color: #465066;
      }

      code {
        padding: 2px 6px;
        border-radius: 4px;
        background: #eef1f6;
        color: #172033;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Paper Learning Library</h1>
      <p>
        Static deployment placeholder for AGE-20. Replace the files in
        <code>site/</code> with the MVP paper reading pages, then push to
        <code>main</code> to publish through GitHub Pages.
      </p>
    </main>
  </body>
</html>
